<svg width="950" height="360" viewBox="0 0 950 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bubble {
      fill: #eaecef;
    }

    .text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      fill: #111827;
      font-size: 28px;
      font-weight: 500;
    }

    .small {
      font-size: 25px;
      font-weight: 450;
    }
  </style>

  <rect x="20" y="20" width="250" height="62" rx="28" class="bubble"/>
  <text x="48" y="60" class="text">Hi, I'm Lua 👋</text>

  <rect x="20" y="105" width="790" height="82" rx="28" class="bubble"/>
  <text x="48" y="140" class="text small">On paper, it's Luana.</text>
  <text x="48" y="170" class="text small">In practice, I organize messy data and messy decisions.</text>

  <rect x="20" y="215" width="850" height="92" rx="28" class="bubble"/>
  <text x="48" y="252" class="text small">Data Science &amp; AI student documenting what I'm learning,</text>
  <text x="48" y="282" class="text small">testing, breaking, fixing, and turning into real projects.</text>
</svg>
